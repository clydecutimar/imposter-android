name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Build APK
        run: |
          rm -rf www
          mkdir -p www
          cp index.html www/index.html
          [ -f styles.css ] && cp styles.css www/styles.css || true
          [ -f app.js ] && cp app.js www/app.js || true
          npx cap add android
          npx cap sync android
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
